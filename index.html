<!DOCTYPE html>
<html  lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My shop</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background: black;
    color: white;
    text-align: center;
    padding:20px;
    font-size: 24px;
    font-weight: bold;
}

.container{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding:20px;
}

.card{
    background: white;
    width:200px;
    margin:15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    padding:15px;
}

.card img{
    width:100%;
    border-radius: 10px;
}

.price{
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0;
}

button{
  background:#25D366;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  opacity:0.8;
}
</style>

</head>
<body>

<header>
My shop
</header>

<div class="container">

<div class="card">
<img src="img/short.jpg" alt="Polo">
<h3>Polo Oversize</h3>
<p class="price">S/ 45</p>
<a href="https://wa.me/51960552996" target="_blank">
<button>Comprar por WhatsApp</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="Casaca">
<h3>Casaca Street</h3>
<p class="price">S/ 90</p>
<a href="https://wa.me/51960552996" target="_blank">
<button>Comprar por WhatsApp</button>
</a>
</div>

</div>

</body>
</html>
